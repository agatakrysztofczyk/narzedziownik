<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narzędziownik</title>
  <link rel="stylesheet" href="style.css">
  <!-- Favicons / app icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" href="icons/favicon.ico">
  <meta name="theme-color" content="#1976d2">
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.3/dist/dexie.min.js"></script>
</head>
<body>
  <header>
    <h1>Narzędziownik</h1>
	<div id="themeToggle">
		<button id="toggleThemeBtn" title="Zmień motyw">🌙 Tryb ciemny</button>
	</div>
    <input type="text" id="searchInput" placeholder="🔍 Szukaj narzędzia...">
  </header>

  <main>
	<!-- PRZYCISK DO POKAZYWANIA / UKRYWANIA FORMULARZA -->
	<div class="top-bar">
	  <button id="toggleFormBtn">➕ Dodaj nowe narzędzie</button>
	</div>

		<!-- FORMULARZ -->
		<section id="formSection">
		  <h2>Dodaj lub edytuj narzędzie</h2>
		  <form id="toolForm">
            <input type="hidden" id="toolId">
            <div class="form-grid">
            <div class="field">
              <label for="nazwaPL">Nazwa narzędzia (PL):</label>
              <input type="text" id="nazwaPL" placeholder="np. Medytacja">
            </div>
            <div class="field">
              <label for="nazwaEN">Nazwa narzędzia (EN):</label>
              <input type="text" id="nazwaEN" placeholder="np. Meditation">
            </div>
            <div class="field">
              <label for="kategoria">Kategoria:</label>
              <input type="text" id="kategoria" placeholder="np. Relaks">
            </div>
            <div class="field">
              <label for="potrzebne">Co będzie potrzebne do wykonania?</label>
              <textarea id="potrzebne" rows="2" placeholder="np. Ciche miejsce, mata"></textarea>
            </div>
            <div class="field">
              <label for="efekt">Jaki daje efekt?</label>
              <textarea id="efekt" rows="2" placeholder="np. Redukcja stresu i napięcia"></textarea>
            </div>
            <div class="field">
              <label for="czasEfektu">Po jakim czasie można zauważyć efekt?</label>
              <input type="text" id="czasEfektu" placeholder="np. Po kilku dniach">
            </div>
            <div class="field">
              <label for="przeciwskazania">Przeciwskazania:</label>
              <textarea id="przeciwskazania" rows="2" placeholder="np. Brak dla zdrowych osób"></textarea>
            </div>
            <div class="field">
              <label for="instrukcja">Instrukcja:</label>
              <textarea id="instrukcja" rows="3" placeholder="np. Usiądź wygodnie i skup się na oddechu"></textarea>
            </div>
            <div class="field">
              <label for="linkYoutube">Link do instruktażu na YouTube:</label>
              <input type="url" id="linkYoutube" placeholder="https://youtube.com/...">
            </div>
            <div class="field">
              <label for="linkWWW">Link do strony WWW z opisem:</label>
              <input type="url" id="linkWWW" placeholder="https://example.com/...">
            </div>
            <div class="field">
              <label for="hasztagi">Na co pomaga (hasztagi):</label>
              <input type="text" id="hasztagi" placeholder="#stres #relaks">
            </div>
            <div class="field">
              <label for="nurt">W jakim nurcie psychoterapii jest wykorzystywane?</label>
              <input type="text" id="nurt" placeholder="np. Mindfulness, CBT">
            </div>
            </div>
            <div class="form-buttons">
              <button type="submit">💾 Zapisz</button>
              <button type="button" id="cancelEdit" class="hidden">❌ Anuluj edycję</button>
            </div>
          </form>
		</section>

    <!-- FILTROWANIE -->
    <section id="filterSection">
      <h3>Filtruj po hasztagach:</h3>
      <div id="hashtagFilter"></div>
    </section>

    <!-- LISTA NARZĘDZI -->
    <section id="toolsList" class="grid"></section>
	<!-- OKNO MODALNE ZE SZCZEGÓŁAMI -->
	<div id="toolModal" class="modal">
	  <div id="modalContent" class="modal-content"></div>
	</div>

  </main>

  <footer>
    <p>Tryb offline: <span id="offlineStatus">🟢 online</span></p>
  </footer>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
